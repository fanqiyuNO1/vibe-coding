<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- viewport 让手机屏幕正确显示，禁止用户缩放 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>猎巫镇 DM 语音播报器</title>
<style>
/*
 * ==============================================================
 * 第一部分：配色和基础设置
 * 这里是整个 App 的"调色盘"，后面所有颜色都从这里取
 * 改了这里，整个 App 的颜色都会跟着变
 * ==============================================================
 */

/*
 * 用 var(--名字) 的方式引用颜色，类似给颜色起外号
 * 比如 var(--page) 就是 #e8e4db 这个米黄色
 * 好处：改一个地方，所有用这个颜色的地方都自动更新
 */
:root {
  --page: #e8e4db;            /* 页面底色：米黄色，像旧纸张 */
  --card: #f0ece4;            /* 卡片底色：比页面再亮一点 */
  --bg-input: #e5e0d6;        /* 输入框底色：比卡片略深 */
  --ink: #383026;             /* 主要文字颜色：深褐色，像墨水 */
  --ink-light: #6b6052;       /* 次要文字颜色：中等灰褐 */
  --ink-dim: #a09885;         /* 弱化文字颜色：浅灰褐 */
  --accent: #b08a3a;          /* 强调色（按钮/金色）：复古金 */
  --accent-hover: #c49b45;    /* 按钮被鼠标指到时变亮 */
  --border: rgba(0,0,0,0.06); /* 边框：很淡的黑色，几乎看不见 */
  --border-focus: rgba(176,138,58,0.35); /* 点击输入框时出现的金色边框 */
  --radius-sm: 6px;           /* 小圆角 */
  --radius-md: 12px;          /* 中圆角 */
  --radius-lg: 16px;          /* 大圆角 */
  --shadow: 0 1px 8px rgba(0,0,0,0.04);       /* 卡片阴影 */
  --shadow-btn: 0 2px 8px rgba(176,138,58,0.15); /* 按钮阴影 */
  --transition: 0.25s ease;   /* 所有动画过渡时间：0.25 秒 */
}

/* 通配符：所有元素统一用 border-box 盒模型，去掉默认外边距和内边距 */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* 整个页面占满屏幕，禁止滚动条 */
html, body { height: 100%; overflow: hidden; }

/*
 * body 背景：深一点的米灰（#dfdbd2）
 * 用 flex 布局让 .app 容器在屏幕正中央
 * user-select: none 禁止选中文字（手机上不会出现蓝色选中条）
 */
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", -apple-system, sans-serif;
  background: #dfdbd2;              /* 外层背景：比 App 深，制造层次感 */
  color: var(--ink);
  display: flex;                     /* flex 布局 */
  justify-content: center;           /* 水平居中 */
  align-items: center;               /* 垂直居中 */
  min-height: 100vh;
  min-height: 100dvh;                /* dvh = 动态视口高度，手机上更准 */
  user-select: none;                 /* 禁止选中文字 */
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent; /* 移动端去掉点击蓝色高亮 */
  -webkit-font-smoothing: antialiased;     /* 字体更清晰 */
}

/*
 * .app 是主容器，模拟一台手机
 * 宽度最大 440px（超过这个宽度的屏幕会居中显示，左右留灰底）
 * 高度撑满整个屏幕
 */
.app {
  width: 100%;
  max-width: 440px;           /* 最大宽度 440px，模拟手机宽度 */
  height: 100vh;
  height: 100dvh;             /* 满屏高 */
  display: flex;
  flex-direction: column;     /* 内容从上到下排列 */
  position: relative;          /* 为内部绝对定位的 .screen 提供参照 */
  overflow: hidden;            /* 超出容器的内容隐藏 */
  background: var(--page);     /* 米黄色底色 */
}

/*
 * ==============================================================
 * 第二部分：页面切换机制
 * 四个页面叠在一起，每次只显示一个（加 .active 的那个）
 * 不显示的页面：透明 + 点不到
 * ==============================================================
 */

/*
 * 每个 .screen 都是"绝对定位"，全部叠在 .app 里同一个位置
 * position: absolute + inset: 0 表示铺满整个 .app
 * 默认状态：opacity: 0（完全透明看不见）
 *           pointer-events: none（鼠标/手指点不到）
 *           transform: translateY(6px)（轻微下移，切换时有动画感）
 */
.screen {
  position: absolute;         /* 相对于 .app 绝对定位 */
  inset: 0;                   /* top/right/bottom/left 全部为 0，撑满 */
  display: flex;
  flex-direction: column;     /* 内容从上到下排列 */
  padding: 28px 24px;         /* 内边距：上下 28px，左右 24px */
  z-index: 1;                 /* 层级 */
  opacity: 0;                 /* 完全透明 */
  transform: translateY(6px); /* 往下偏移 6px */
  pointer-events: none;       /* 鼠标/手指事件穿透，点不到 */
  transition: opacity var(--transition), transform var(--transition); /* 0.25 秒渐变 */
}

/* 激活状态：不透明 + 回到原位 + 可以点击 */
.screen.active {
  opacity: 1;                 /* 完全不透明 */
  transform: translateY(0);   /* 回到原位 */
  pointer-events: auto;       /* 可以点击了 */
}

/*
 * ==============================================================
 * 第三部分：返回按钮（← 返回首页 / ← 返回选择）
 * 多个页面共用这个样式
 * ==============================================================
 */
.back-btn {
  align-self: flex-start;     /* 自己靠左，不跟其他元素挤在一起 */
  background: none;           /* 不要背景色 */
  border: none;               /* 不要边框 */
  color: var(--ink-light);   /* 灰褐色 */
  font-size: 14px;
  font-weight: 500;
  padding: 6px 0;             /* 内边距：上下 6px */
  cursor: pointer;            /* 鼠标移上去变成手指 */
  margin-bottom: 24px;        /* 和下面内容的间距 */
  transition: color var(--transition); /* 颜色变化 0.25 秒过渡 */
  font-family: inherit;       /* 继承 body 的字体 */
  flex-shrink: 0;             /* 不会被压扁 */
}
/* 鼠标移到返回按钮上时颜色变深 */
.back-btn:hover { color: var(--ink); }

/*
 * ==============================================================
 * 第四部分：① 首页 (screen-home)
 * 就是打开 App 看到的第一个画面
 * 巫师图标 + "猎巫镇" + "Salem 1692" + "轻触屏幕开始"
 * ==============================================================
 */
#screen-home {
  justify-content: center;    /* 内容垂直居中 */
  align-items: center;        /* 内容水平居中 */
  gap: 6px;                   /* 子元素之间的间距 */
  cursor: pointer;            /* 整个首页都可以点（点哪都行） */
}

.home-icon {
  font-size: 56px;            /* 巫师大图标 */
  margin-bottom: 16px;        /* 和标题的间距 */
  opacity: 0.85;              /* 微微透明 */
}

.home-title {
  font-size: 32px;            /* "猎巫镇" 大标题 */
  font-weight: 800;           /* 最粗字重 */
  letter-spacing: 8px;        /* 字间距 8px，拉散一点 */
  color: var(--ink);
}

.home-subtitle {
  font-size: 13px;
  color: var(--ink-dim);     /* 浅色，不抢标题风头 */
  letter-spacing: 5px;        /* 字间距 */
  font-weight: 500;
}

.home-divider {
  width: 36px;                /* 分割线宽度 */
  height: 1px;                /* 只有 1px 高，就是一条细线 */
  background: var(--ink-dim);/* 浅色 */
  margin: 12px 0;             /* 上下各 12px */
  opacity: 0.4;               /* 很淡 */
}

.home-hint {
  font-size: 12px;
  color: var(--ink-dim);
  letter-spacing: 3px;
  margin-top: 36px;           /* 离上面远一点，放在底部 */
  opacity: 0.5;               /* 半透明提示文字 */
}

/*
 * ==============================================================
 * 第五部分：② 阶段选择页 (screen-phase)
 * 选黎明还是夜晚
 * ==============================================================
 */
#screen-phase {
  justify-content: flex-start; /* 内容从顶部开始排 */
}

/* 卡片组：两张卡片一起管理 */
.phase-cards-group {
  flex: 1;                      /* 占满剩余空间 */
  display: flex;
  flex-direction: column;       /* 从上到下排列 */
  justify-content: center;      /* 垂直居中 */
  gap: 40px;                    /* 两张卡片之间间隔 40px */
  min-height: 0;                /* 允许收缩 */
  padding: 0 4px;               /* 左右各留 4px */
}

/* 每张阶段卡片 */
.phase-card {
  background: var(--card);      /* 卡片底色 */
  border: 1px solid var(--border); /* 很淡的边框 */
  border-radius: var(--radius-lg); /* 大圆角 16px */
  padding: 32px 28px;           /* 内边距 */
  cursor: pointer;              /* 鼠标变手指，表示可点击 */
  transition: all var(--transition); /* 所有变化 0.25 秒过渡 */
  text-align: center;           /* 文字居中 */
}
/* 鼠标指到卡片上 */
.phase-card:hover {
  border-color: rgba(0,0,0,0.12); /* 边框变明显一点 */
  background: #f3f0e9;          /* 背景微微变亮 */
}
/* 手指按下卡片（移动端） */
.phase-card:active { transform: scale(0.985); } /* 缩小到 98.5%，有按下的感觉 */

.phase-card .icon {
  font-size: 36px;              /* 🌅 或 🌙 图标，36px 大 */
  margin-bottom: 10px;          /* 图标和标题之间的间距 */
  display: block;               /* 独占一行 */
}

.phase-card .label {
  font-size: 20px;              /* "黎明阶段" / "夜晚阶段" */
  font-weight: 700;             /* 粗体 */
  color: var(--ink);
  letter-spacing: 3px;          /* 字间距 */
  margin-bottom: 6px;
}
.phase-card .desc {
  font-size: 12px;
  color: var(--ink-dim);        /* 描述文字浅色 */
}

/*
 * ==============================================================
 * 第六部分：③ 编辑页 (screen-edit)
 * 这里台词列表是 JS 动态生成的，CSS 只管样式
 * ==============================================================
 */

/* 页面头部：图标 + 标题（如 🌅 黎明阶段） */
.screen-header {
  display: flex;
  align-items: center;          /* 图标和文字垂直居中 */
  gap: 8px;                     /* 图标和文字间距 */
  margin-bottom: 8px;
  flex-shrink: 0;               /* 不被压扁 */
}
.screen-header .header-icon { font-size: 20px; }
.screen-header .title {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 2px;
}

/*
 * 台词列表区域
 * flex: 1 让它自动撑满中间所有空间
 * overflow-y: auto 台词太多时可以滚动
 */
.edit-list {
  flex: 1;                      /* 撑满可用空间 */
  min-height: 0;                /* 允许收缩 */
  overflow-y: auto;             /* 内容超出时显示滚动条 */
  display: flex;
  flex-direction: column;
  gap: 10px;                    /* 每个台词块间距 */
  padding: 4px 0 16px 0;
  -webkit-overflow-scrolling: touch; /* iOS 顺滑滚动 */
  scroll-behavior: smooth;      /* 平滑滚动 */
}

/* 每条台词卡片（由 JS 创建） */
.edit-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md); /* 12px 圆角 */
  padding: 14px 16px;
  display: flex;
  flex-direction: column;       /* 内部从上到下排 */
  gap: 8px;                     /* 编号、输入框、秒数行之间的间距 */
  flex-shrink: 0;               /* 不被压扁 */
}

/* 台词编号：第 1 句、第 2 句... */
.edit-item .line-number {
  font-size: 10px;
  color: var(--ink-dim);
  font-weight: 600;
  letter-spacing: 2px;
}

/* 台词输入框 */
.edit-item .text-input {
  background: var(--bg-input);
  border: 1px solid transparent; /* 默认边框透明 */
  border-radius: var(--radius-sm); /* 6px 圆角 */
  padding: 10px 12px;
  font-size: 15px;
  color: var(--ink);
  font-family: inherit;         /* 继承页面字体 */
  outline: none;                /* 去掉浏览器默认蓝色外框 */
  transition: all var(--transition);
  width: 100%;                  /* 占满整行 */
}
/* 输入框占位文字颜色 */
.edit-item .text-input::placeholder { color: var(--ink-dim); }
/* 点击输入框时：显示金色边框 + 背景亮一点 */
.edit-item .text-input:focus {
  border-color: var(--border-focus);
  background: #efebe3;
}

/* 等待秒数那一行：⏱ 等待 [3] 秒 */
.edit-item .wait-row {
  display: flex;
  align-items: center;          /* 垂直居中 */
  gap: 8px;                     /* 三个元素间距 */
}

.edit-item .wait-label {
  font-size: 12px;
  color: var(--ink-dim);
  white-space: nowrap;          /* 不换行 */
}

/* 等待秒数输入框 */
.edit-item .wait-input {
  background: var(--bg-input);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 7px 8px;
  font-size: 14px;
  color: var(--accent);         /* 金色文字 */
  font-family: inherit;
  font-weight: 700;             /* 粗体 */
  width: 56px;                  /* 固定宽度 */
  text-align: center;           /* 数字居中 */
  outline: none;
  transition: all var(--transition);
}
.edit-item .wait-input:focus {
  border-color: var(--border-focus);
  background: #efebe3;
}

.edit-item .wait-suffix {
  font-size: 12px;
  color: var(--ink-dim);
}

/* ▶ 开始播报 按钮 */
.start-btn {
  width: 100%;                  /* 占满整行 */
  padding: 15px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--accent);    /* 金色背景 */
  color: #fff;                  /* 白色文字 */
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 4px;          /* 字间距 */
  transition: all var(--transition);
  font-family: inherit;
  margin-top: 8px;
  flex-shrink: 0;
  box-shadow: var(--shadow-btn);/* 金色投影 */
}
.start-btn:hover { background: var(--accent-hover); }
.start-btn:active { transform: scale(0.975); } /* 按下缩小 */

/* 玩家总数设置行（仅夜晚编辑页显示） */
.player-count-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.player-count-row .count-label {
  font-size: 13px;
  color: var(--ink-light);
  font-weight: 500;
  white-space: nowrap;
}

.player-count-row .count-input {
  background: var(--bg-input);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 7px 8px;
  font-size: 14px;
  color: var(--accent);
  font-family: inherit;
  font-weight: 700;
  width: 52px;
  text-align: center;
  outline: none;
  transition: all var(--transition);
}

.player-count-row .count-input:focus {
  border-color: var(--border-focus);
  background: #efebe3;
}

.player-count-row .count-suffix {
  font-size: 12px;
  color: var(--ink-dim);
}

/*
 * ==============================================================
 * 第七部分：④ 播报中 (screen-broadcast)
 * 默认显示 🔊 图标和"播报中"文字（不显示台词）
 * 交互选人时显示玩家编号选择面板
 * ==============================================================
 */
#screen-broadcast {
  justify-content: center;      /* 内容垂直居中 */
  align-items: center;          /* 内容水平居中 */
}

/* 默认播报状态容器 */
.broadcast-container {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.broadcast-container.hidden { display: none; }

.broadcast-core-icon {
  font-size: 56px;
  margin-bottom: 28px;
  opacity: 0.75;
}

.broadcast-label {
  font-size: 20px;
  color: var(--ink);
  letter-spacing: 6px;
  font-weight: 700;
  margin-bottom: 6px;
}

.broadcast-sub {
  font-size: 13px;
  color: var(--ink-dim);
  letter-spacing: 4px;
}

/* 玩家编号选择面板（默认隐藏，需要选人时才显示） */
.player-select-panel {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  padding: 0 12px;
}

.player-select-panel.visible { display: flex; }

.player-select-panel .select-hint {
  font-size: 15px;
  color: var(--ink-light);
  font-weight: 600;
  letter-spacing: 2px;
}

/* 玩家编号按钮网格：一行 3 个，超出自动换行 */
.player-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
}

.player-btn {
  width: 80px;
  height: 80px;
  border-radius: var(--radius-md);
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--ink);
  font-size: 32px;
  font-weight: 800;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.player-btn:active {
  transform: scale(0.92);
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.player-btn.selected {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  pointer-events: none;
  animation: pulse-select 0.4s ease;
}

@keyframes pulse-select {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* 翻牌结果面板（默认隐藏，夜晚播完后显示） */
.result-reveal-panel {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 36px;
  width: 100%;
  padding: 0 16px;
}

.result-reveal-panel.visible { display: flex; }

.result-reveal-panel .reveal-hint {
  font-size: 18px;
  color: var(--ink-light);
  letter-spacing: 3px;
  font-weight: 600;
}

/* 翻牌卡片：正面盖牌状态 */
.reveal-card {
  width: 180px;
  height: 240px;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, #2c2416 0%, #4a3b24 50%, #2c2416 100%);
  border: 2px solid var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s ease;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.reveal-card:active { transform: scale(0.96); }

.reveal-card .card-pattern {
  font-size: 52px;
  opacity: 0.25;
  letter-spacing: 6px;
  color: var(--accent);
}

/* 翻牌后：显示号码 */
.reveal-card.flipped {
  background: var(--card);
  border-color: var(--accent);
  cursor: default;
}

.reveal-card.flipped .card-pattern { display: none; }

.reveal-card .card-number {
  display: none;
  font-size: 100px;
  font-weight: 800;
  color: var(--ink);
}

.reveal-card.flipped .card-number { display: block; }

/* 翻牌动画 */
.reveal-card.flipped {
  animation: flip-card 0.5s ease;
}

@keyframes flip-card {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}

/* 确认按钮（翻牌后显示） */
.result-confirm-btn {
  display: none;
  width: 100%;
  max-width: 280px;
  padding: 16px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--accent);
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 4px;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-btn);
}

.result-confirm-btn.visible { display: block; }
.result-confirm-btn:active { transform: scale(0.975); }

/*
 * ==============================================================
 * 第八部分：滚动条美化和小屏适配
 * ==============================================================
 */

/* 台词列表的滚动条：做细一点，淡一点 */
.edit-list::-webkit-scrollbar { width: 3px; }           /* 滚动条宽度 3px */
.edit-list::-webkit-scrollbar-track { background: transparent; } /* 滚动条轨道透明 */
.edit-list::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.08); /* 滚动条滑块淡黑色 */
  border-radius: 6px;
}

/* 屏幕宽度小于等于 380px 时（小手机），缩小一些东西 */
@media (max-width: 380px) {
  .home-title { font-size: 26px; letter-spacing: 6px; } /* 标题缩小 */
  .home-icon { font-size: 44px; }                        /* 图标缩小 */
  .screen { padding: 24px 18px; }                        /* 内边距减小 */
  .phase-card { padding: 26px 22px; }                    /* 卡片内边距减小 */
}
</style>
</head>
<body>

<!--
  ==============================================================
  这是 HTML 部分 — 页面的骨架
  四个页面全部写在里面，默认只有首页是 active（可见）
  切换页面时 JS 会挪动 active 类
  ==============================================================
-->

<div class="app">
  <!--
    ① 首页
    active 表示默认显示
    onclick="goTo('phase')" 表示点击后调用 goTo 函数，跳到阶段选择页
  -->
  <div class="screen active" id="screen-home" onclick="goTo('phase')">
    <div class="home-icon">🧙</div>
    <div class="home-title">猎 巫 镇</div>
    <div class="home-subtitle">Salem 1692</div>
    <div class="home-divider"></div>
    <div class="home-hint">轻 触 屏 幕 开 始</div>
  </div>

  <!--
    ② 阶段选择页
    event.stopPropagation() 阻止事件冒泡（点返回按钮时不会触发父元素的点击）
  -->
  <div class="screen" id="screen-phase">
    <button class="back-btn" onclick="event.stopPropagation(); goTo('home')">← 返回首页</button>
    <div class="phase-cards-group">
      <!-- 点黎明卡片 → 跳转到黎明编辑页 -->
      <div class="phase-card" onclick="goToEdit('dawn')">
        <div class="icon">🌅</div>
        <div class="label">黎明阶段</div>
        <div class="desc">5 句台词 · 女巫放置黑猫</div>
      </div>
      <!-- 点夜晚卡片 → 跳转到夜晚编辑页 -->
      <div class="phase-card" onclick="goToEdit('night')">
        <div class="icon">🌙</div>
        <div class="label">夜晚阶段</div>
        <div class="desc">7 句台词 · 女巫杀人 &amp; 警长保护</div>
      </div>
    </div>
  </div>

  <!--
    ③ 编辑页
    黎明和夜晚共用这个页面，JS 会根据选的是哪一个来填充内容
    id="edit-list" 里面的台词卡片由 JS 动态生成
    id="edit-title" 和 id="edit-icon" 也是 JS 动态填的
  -->
  <div class="screen" id="screen-edit">
    <button class="back-btn" onclick="goTo('phase')">← 返回选择</button>
    <div class="screen-header">
      <!-- JS 会往这里填 🌅 或 🌙 -->
      <span class="header-icon" id="edit-icon"></span>
      <!-- JS 会往这里填 "黎明阶段" 或 "夜晚阶段" -->
      <span class="title" id="edit-title"></span>
    </div>
    <!-- 玩家总数设置行（仅夜晚阶段显示，JS 动态生成） -->
    <div id="player-count-row"></div>
    <!-- 台词编辑列表，JS 动态填充 -->
    <div class="edit-list" id="edit-list"></div>
    <!-- 点击 → 开始语音播报 -->
    <button class="start-btn" onclick="startBroadcast()">▶ 开 始 播 报</button>
  </div>

  <!--
    ④ 播报中
    默认显示 🔊 图标 + "播报中"（纯语音，不显示台词）
    需要玩家选人时显示编号选择面板
    夜晚播完后显示翻牌结果面板
  -->
  <div class="screen" id="screen-broadcast">
    <div class="broadcast-container" id="broadcast-default">
      <div class="broadcast-core-icon">🔊</div>
      <div class="broadcast-label">播 报 中</div>
      <div class="broadcast-sub">请保持安静</div>
    </div>
    <div class="player-select-panel" id="player-select-panel">
      <div class="select-hint">👆 选择杀害目标</div>
      <div class="player-grid" id="player-grid"></div>
    </div>
    <div class="result-reveal-panel" id="result-reveal-panel">
      <div class="reveal-hint">🌙 昨晚女巫杀的是……</div>
      <div class="reveal-card" id="reveal-card" onclick="flipRevealCard()">
        <span class="card-pattern">🃏</span>
        <span class="card-number" id="card-number"></span>
      </div>
      <button class="result-confirm-btn" id="result-confirm-btn" onclick="confirmResult()">确 认</button>
    </div>
  </div>
</div>

<!--
  ==============================================================
  这是 JavaScript 部分 — 页面的"大脑"
  负责：切换页面、生成编辑列表、语音播报
  ==============================================================
-->
<script>

/*
 * ==============================================================
 * 台词数据库
 * 黎明 5 句话 + 夜晚 7 句话，每句话对应一个等待秒数
 * 改这里的文字就能改播报内容
 * ==============================================================
 */

/*
 * SCRIPT_DATA 是一个"数据字典"，存了两个阶段的全部信息
 * 结构说明：
 *   title  → 阶段标题（"黎明阶段" / "夜晚阶段"）
 *   icon   → 阶段图标（🌅 / 🌙）
 *   lines  → 台词数组，第 0 个是第 1 句，第 1 个是第 2 句……
 *   waits  → 等待时间数组，和 lines 一一对应，单位是"秒"
 *
 * 比如第 3 句女巫放黑猫，需要等 5 秒让玩家操作
 * 最后一句（天亮了/睁眼）的等待是 0，因为不需要等
 */
const SCRIPT_DATA = {
  dawn: {
    title: '黎明阶段',
    icon: '🌅',
    lines: [
      '所有玩家请闭眼',                // 第 1 句
      '女巫请睁眼，互相确认身份',      // 第 2 句
      '女巫请将黑猫放在任意一名玩家面前', // 第 3 句
      '女巫请闭眼',                    // 第 4 句
      '所有玩家请睁眼',                // 第 5 句
    ],
    waits: [2, 2, 5, 1.5, 0],  // 对应每句之后的等待秒数
  },
  night: {
    title: '夜晚阶段',
    icon: '🌙',
    lines: [
      '天黑请闭眼',
      '女巫请睁眼，选择今晚要杀害的角色',
      '女巫请闭眼',
      '警长请睁眼',
      '警长请选择要保护的人',
      '警长请闭眼',
      '天亮了',
    ],
    waits: [2, 10, 1.5, 1, 5, 2, 0],
    interact: [false, true, false, false, false, false, false],
  },
};

/*
 * 四个全局变量
 * currentPhase：记住用户选的是 'dawn'（黎明）还是 'night'（夜晚）
 * isBroadcasting：播报的时候锁住，防止用户乱点跳走
 * playerCount：玩家总数，默认 6，夜晚编辑页可调整
 * selectedPlayer：女巫选中的玩家编号，默认 0 表示未选
 */
let currentPhase = null;
let isBroadcasting = false;
let playerCount = 6;
let selectedPlayer = 0;

/**
 * $$（两个美元符号）：快速选中页面元素的工具函数
 *
 * 用法示例：
 *   $$('#edit-title')  →  找到 id 是 edit-title 的元素
 *   $$('.phase-card')  →  找到第一个 class 是 phase-card 的元素
 *
 * 就相当于 document.querySelector 的缩写，少打很多字
 */
function $$(sel) { return document.querySelector(sel); }

/**
 * goTo：切换页面
 *
 * @param {string} screen - 要跳转到的页面名字
 *   可选值：'home'（首页）、'phase'（阶段选择）、'edit'（编辑页）、'broadcast'（播报中）
 *
 * 原理：
 *   1. 先检查 isBroadcasting，如果在播报中就不让跳转
 *   2. 把所有 .screen 的 active 全去掉
 *   3. 给目标 screen 加上 active
 * 因为 CSS 里写了 .screen.active 才可见，所以加了 active 的就显示，其他的隐藏
 */
function goTo(screen) {
  if (isBroadcasting) return;                    // 播报中，禁止跳转
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));                // 所有页面隐藏
  $$('#screen-' + screen).classList.add('active'); // 目标页面显示
}

/**
 * goToEdit：进入编辑页（点击黎明或夜晚卡片时调用）
 *
 * @param {string} phase - 阶段名称：'dawn'（黎明）或 'night'（夜晚）
 *
 * 做的事情：
 *   1. 记住用户选的哪个阶段（存到 currentPhase）
 *   2. 从 SCRIPT_DATA 里取出这个阶段的台词和等待秒数
 *   3. 设置页面标题和图标（比如 "🌅 黎明阶段"）
 *   4. 用 JS 生成编辑列表（几句台词就生成几个卡片，每个卡片有：
 *      台词输入框 + 等待秒数输入框）
 *   5. 跳转到编辑页
 *
 * 注意：黎明和夜晚用的是同一个编辑页（screen-edit）
 * 每次点卡片都会清掉旧内容重新生成
 */
function goToEdit(phase) {
  currentPhase = phase;                          // 记住：'dawn' 或 'night'
  const data = SCRIPT_DATA[phase];               // 取数据

  // 设置页面头部标题和图标
  $$('#edit-title').textContent = data.title;    // 填 "黎明阶段" 或 "夜晚阶段"
  $$('#edit-icon').textContent = data.icon;      // 填 🌅 或 🌙

  // 玩家总数设置行：仅夜晚阶段显示
  const countRow = $$('#player-count-row');
  if (phase === 'night') {
    countRow.innerHTML =
      '<div class="player-count-row">' +
        '<span class="count-label">👥 玩家总数</span>' +
        '<input class="count-input" id="player-count-input" type="number" min="4" max="12" value="' + playerCount + '" step="1">' +
        '<span class="count-suffix">人</span>' +
      '</div>';
  } else {
    countRow.innerHTML = '';
  }

  // 获取编辑列表容器，清空之前的内容
  const list = $$('#edit-list');
  list.innerHTML = '';

  // 循环生成每条台词卡片
  // forEach 会遍历数组，每次给你当前元素和它在数组中的位置（从 0 开始）
  data.lines.forEach((text, i) => {
    // 创建一个 div 当台词卡片
    const item = document.createElement('div');
    item.className = 'edit-item';

    // 往这个 div 里塞 HTML：
    //   第 X 句
    //   [台词输入框]  ← value 预填默认台词
    //   ⏱ 等待 [秒数输入框] 秒
    //
    // 输入框上有 data-idx 属性，记录了是第几句（0 开始）
    // escapeHtml(text) 是防止台词里有 < > & 等特殊字符捣乱
    item.innerHTML =
      '<div class="line-number">第 ' + (i + 1) + ' 句</div>' +
      '<input class="text-input" value="' + escapeHtml(text) + '" data-idx="' + i + '" data-field="text">' +
      '<div class="wait-row">' +
        '<span class="wait-label">⏱ 等待</span>' +
        '<input class="wait-input" type="number" step="any" min="0" max="120" value="' + data.waits[i] + '" data-idx="' + i + '" data-field="wait">' +
        '<span class="wait-suffix">秒</span>' +
      '</div>';

    list.appendChild(item);                      // 把卡片加到列表里
  });

  goTo('edit');                                  // 跳转到编辑页
}

/**
 * escapeHtml：把特殊字符转成 HTML 安全文本
 *
 * @param {string} s - 原始字符串
 * @returns {string} - 转义后的安全字符串
 *
 * 作用：如果台词里有 < > & " 这些字符，直接插到 HTML 里会出问题
 * 把它们换成 &amp; &lt; &gt; &quot; 就安全了
 */
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
}

/**
 * getEditedData：从编辑页读取用户填的内容
 *
 * @returns {Object} { lines: 台词数组, waits: 等待秒数数组 }
 *
 * 做的事情：
 *   遍历编辑页里的每条台词卡片
 *   读出台词输入框的值 → 存到 lines 数组
 *   读出秒数输入框的值 → 存到 waits 数组
 *
 * 如果用户把台词清空了 → 用默认台词填充
 * 如果用户没填秒数 → 默认为 0
 */
function getEditedData() {
  const items = $$('#edit-list').children;      // 拿到所有台词卡片
  const lines = [];                              // 存台词
  const waits = [];                              // 存秒数

  for (let i = 0; i < items.length; i++) {
    // 找到当前卡片里的台词输入框
    const textInput = items[i].querySelector('.text-input');
    // 找到当前卡片里的秒数输入框
    const waitInput = items[i].querySelector('.wait-input');

    // 读出台词，如果为空就用默认台词顶替
    lines.push(textInput.value.trim() || SCRIPT_DATA[currentPhase].lines[i]);
    // 读出秒数，转成数字，最小为 0
    waits.push(Math.max(0, parseFloat(waitInput.value) || 0));
  }

  return { lines: lines, waits: waits };
}

/**
 * startBroadcast：开始播报按钮的点击函数
 *
 * 做了什么：
 *   1. 从编辑页读取用户修改后的台词和秒数
 *   2. 跳转到播报中页面（纯语音界面）
 *   3. 设置 isBroadcasting = true（锁住屏幕不让跳转）
 *   4. 启动语音播报序列，从第 0 句开始念
 */
function startBroadcast() {
  const { lines, waits } = getEditedData();      // 解构赋值：拆出台词和秒数

  // 夜晚阶段：读取玩家总数
  if (currentPhase === 'night') {
    const countInput = $$('#player-count-input');
    if (countInput) {
      playerCount = Math.max(4, Math.min(12, parseInt(countInput.value) || 6));
    }
  }

  hidePlayerGrid();                              // 确保选人面板是隐藏的
  $$('#result-reveal-panel').classList.remove('visible'); // 确保结果面板隐藏
  selectedPlayer = 0;                            // 重置选中
  goTo('broadcast');                             // 跳到播报页面
  isBroadcasting = true;                         // 锁屏
  speakSequence(lines, waits, 0);                // 从第 0 句开始念
}

/**
 * speakSequence：逐句语音播报（核心函数）
 *
 * @param {string[]} lines - 台词数组
 * @param {number[]} waits - 等待秒数数组
 * @param {number} idx      - 当前要播第几句（从 0 开始）
 *
 * 工作流程（递归）：
 *   1. 如果 idx 超出数组长度 → 所有句子都播完了
 *      → 解锁屏幕 → 回到阶段选择页 → 结束
 *   2. 如果当前台词是空的 → 只等延迟，跳过这句
 *   3. 用浏览器内置的 SpeechSynthesis（TTS 语音合成）念出这句台词
 *   4. 等它念完（onend）：
 *      - 普通句子 → 等用户设置的秒数，然后播下一句
 *      - 交互句子 → 显示编号面板启动计时，计时内可点选，计时结束播下一句
 *   5. 调用自己（idx + 1），播下一句
 *
 * 技术细节：
 *   SpeechSynthesisUtterance → 浏览器自带的"文字转语音"对象
 *   lang: 'zh-CN'  → 用中文发音
 *   rate: 0.9      → 语速 0.9 倍（比正常慢一点点）
 *   onend          → 念完时触发
 *   onerror        → 出错时也继续下一句（不卡住）
 *   setTimeout     → 延迟执行，"等几秒"靠它
 */
function speakSequence(lines, waits, idx) {
  // 全部念完了？
  if (idx >= lines.length) {
    hidePlayerGrid();
    if (currentPhase === 'night') {
      showResultReveal();                        // 夜晚阶段：显示翻牌结果
    } else {
      isBroadcasting = false;                    // 黎明阶段：解锁
      goTo('phase');                             // 回到阶段选择页
    }
    return;                                      // 结束函数
  }

  const text = lines[idx];                       // 当前要念的台词
  const delay = (waits[idx] || 0) * 1000;        // 等待秒数转成毫秒（1 秒 = 1000 毫秒）
  const interact = SCRIPT_DATA[currentPhase].interact;
  const isInteractive = interact && interact[idx]; // 当前句是否要玩家点选编号

  // 如果台词是空的（用户故意删了），只等延迟然后跳下一句
  if (!text) {
    setTimeout(() => speakSequence(lines, waits, idx + 1), delay);
    return;
  }

  // 创建语音播报对象
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';                      // 用中文发音
  utterance.rate = 0.9;                          // 语速 0.9 倍

  // 念完后的回调函数
  utterance.onend = () => {
    if (isInteractive) {
      // 交互模式：显示编号面板，同时启动计时器，女巫在计时内选人
      // 计时走完后再播下一句，选人只是标记目标，不提前结束计时
      showPlayerGrid(playerCount);
      setTimeout(() => {
        hidePlayerGrid();
        speakSequence(lines, waits, idx + 1);
      }, delay);
    } else {
      // 普通模式：等用户设的秒数，然后播下一句
      setTimeout(() => speakSequence(lines, waits, idx + 1), delay);
    }
  };

  // 万一念出错了（比如语音引擎炸了），也别卡住，跳过继续
  utterance.onerror = () => {
    if (isInteractive) {
      showPlayerGrid(playerCount);
      setTimeout(() => {
        hidePlayerGrid();
        speakSequence(lines, waits, idx + 1);
      }, delay);
    } else {
      setTimeout(() => speakSequence(lines, waits, idx + 1), delay);
    }
  };

  // 清掉可能还在念的旧语音，然后念新的
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

/**
 * showPlayerGrid：显示玩家编号选择面板
 *
 * @param {number} n - 玩家总数（显示 1 到 n 号按钮）
 *
 * 做了什么：
 *   1. 隐藏默认播报界面（broadcast-default）
 *   2. 清空旧的编号按钮，生成 1~n 号新按钮
 *   3. 每个按钮点击时高亮选中
 *   4. 显示选择面板
 */
function showPlayerGrid(n) {
  selectedPlayer = 0;
  const grid = $$('#player-grid');
  grid.innerHTML = '';

  for (let i = 1; i <= n; i++) {
    const btn = document.createElement('button');
    btn.className = 'player-btn';
    btn.textContent = i;
    btn.onclick = function () {
      grid.querySelectorAll('.player-btn.selected').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedPlayer = i;
    };
    grid.appendChild(btn);
  }

  $$('#broadcast-default').classList.add('hidden');
  $$('#player-select-panel').classList.add('visible');
}

/**
 * hidePlayerGrid：隐藏玩家编号选择面板，恢复默认播报界面
 */
function hidePlayerGrid() {
  $$('#broadcast-default').classList.remove('hidden');
  $$('#player-select-panel').classList.remove('visible');
}

/**
 * showResultReveal：夜晚播完后显示翻牌结果面板
 *
 * 做了什么：
 *   1. 隐藏默认播报界面
 *   2. 设置卡牌背面的号码
 *   3. 重置卡牌为未翻开状态
 *   4. 隐藏确认按钮
 *   5. 显示翻牌面板
 */
function showResultReveal() {
  $$('#broadcast-default').classList.add('hidden');
  $$('#card-number').textContent = selectedPlayer || '?';
  $$('#reveal-card').classList.remove('flipped');
  $$('#result-confirm-btn').classList.remove('visible');
  $$('#result-reveal-panel').classList.add('visible');
}

/**
 * flipRevealCard：点击卡牌翻开，显示女巫杀害的玩家编号
 */
function flipRevealCard() {
  const card = $$('#reveal-card');
  if (card.classList.contains('flipped')) return;
  card.classList.add('flipped');
  $$('#result-confirm-btn').classList.add('visible');

  const num = selectedPlayer || '?';
  const utter = new SpeechSynthesisUtterance('昨晚女巫杀的是' + num + '号玩家');
  utter.lang = 'zh-CN';
  utter.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

/**
 * confirmResult：点击确认按钮，关闭结果面板，回到阶段选择
 */
function confirmResult() {
  $$('#result-reveal-panel').classList.remove('visible');
  isBroadcasting = false;
  goTo('phase');
}
</script>
